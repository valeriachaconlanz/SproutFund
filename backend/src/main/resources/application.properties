server.port=8080
spring.application.name=sproutfund-backend

spring.datasource.url=jdbc:h2:mem:sproutfunddb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Fine for local/team use. Before deploying publicly, move this to an env var —
# anyone with repo access can read this and forge tokens for any account.
jwt.secret=spr0utfund-jwt-signing-key-2024-change-before-production-deployment
jwt.expiration=86400000
